<!DOCTYPE html><html>
<head>
    <title>PUTZ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }/* Video Background Full Screen */
    #bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: -1;
    }

    /* Overlay Masuk */
    #overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 10;
        color: white;
    }

    /* PUTZ kanan atas animasi jalan */
    .putz {
        position: fixed;
        right: 15px;
        top: 15px;
        font-size: 26px;
        font-weight: bold;
        background: linear-gradient(90deg, red, orange, yellow, red);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shine 3s linear infinite;
    }

    @keyframes shine {
        0% { background-position: 0% center; }
        100% { background-position: 200% center; }
    }

    /* Login Box BENAR-BENAR TENGAH */
    .login-box {
        background: rgba(0, 0, 0, 0.55);
        padding: 20px;
        border-radius: 10px;
        backdrop-filter: blur(6px);
        text-align: center;
        color: white;
        width: 240px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .login-box h2 {
        margin-bottom: 12px;
        font-size: 18px;
    }

    .login-box input {
        width: 85%;
        padding: 8px;
        margin: 6px 0;
        border: none;
        border-radius: 5px;
        text-align: center;
        font-size: 14px;
    }

    .login-box button {
        width: 60%;
        padding: 10px;
        margin-top: 12px;
        border: none;
        border-radius: 6px;
        background: #8b0000;
        color: white;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 0 10px #ff0000;
    }

    .login-box button:hover {
        background: #b30000;
        box-shadow: 0 0 20px #ff0000;
    }
</style>

</head>
<body><div id="overlay" onclick="enterSite()">
    <h1>Tekan Untuk Masuk</h1>
</div><video id="bg-video" loop>
    <source src="ssstik.io_@rayy_senpai03_1772594552530.mp4" type="video/mp4">
</video><div class="putz">PUTZ</div><div class="login-box">
    <h2>Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p id="msg" style="margin-top:10px;font-size:13px;"></p>
</div><script>
function enterSite() {
    var video = document.getElementById("bg-video");
    video.play();
    document.getElementById("overlay").style.display = "none";
}

// LOGIN SEDERHANA (Demo)
function login() {
    var user = document.querySelector('input[type="text"]').value;
    var pass = document.querySelector('input[type="password"]').value;
    var msg = document.getElementById("msg");

    // Username & Password bisa kamu ganti
    if(user === "admin" && pass === "12345"){
        msg.style.color = "#00ff00";
        msg.innerText = "Login Berhasil! Mengalihkan...";
        setTimeout(function(){
            window.location.href = "home.html"; // Pindah halaman
        }, 1000);
    }, 500);
    } else {
        msg.style.color = "#ff0000";
        msg.innerText = "Username atau Password salah!";
    }
}
</script></body>
</html>
