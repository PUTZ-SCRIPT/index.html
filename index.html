<!DOCTYPE html><html>
<head>
    <title>PUTZ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }/* Video Background Full Screen */
    #bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: -1;
    }

    /* Overlay Masuk */
    #overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        cursor: pointer;
        z-index: 10;
        color: white;
    }

    /* Tulisan PUTZ pojok kanan */
    .putz {
        position: fixed;
        right: 15px;
        top: 15px;
        font-size: 26px;
        font-weight: bold;
        background: linear-gradient(90deg, red, orange, yellow, red);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shine 3s linear infinite;
    }

    @keyframes shine {
        0% {
            background-position: 0% center;
        }
        100% {
            background-position: 200% center;
        }
    }
        to {
            text-shadow:
                0 0 10px #fff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
        }
    }

    /* Login Box Tengah Transparan */
    .login-box {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.55);
        padding: 20px;
        border-radius: 10px;
        backdrop-filter: blur(6px);
        text-align: center;
        color: white;
        width: 240px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .login-box h2 {
        margin-bottom: 12px;
        font-size: 18px;
    }

    .login-box input {
        width: 85%;
        padding: 8px;
        margin: 6px 0;
        border: none;
        border-radius: 5px;
        text-align: center;
        font-size: 14px;
    }

    .login-box button {
        width: 60%;
        padding: 10px;
        margin: 15px auto 0 auto;
        display: block;
        border: none;
        border-radius: 6px;
        background: #8b0000;
        color: white;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 0 10px #ff0000;
    }

    .login-box button:hover {
        background: #b30000;
        box-shadow: 0 0 20px #ff0000;
    }
</style>

</head>
<body><!-- Overlay Klik untuk Masuk --><div id="overlay" onclick="enterSite()">
    <h1>Tekan Untuk Masuk</h1>
</div><!-- Video Background --><video id="bg-video" loop>
    <source src="ssstik.io_@rayy_senpai03_1772594552530.mp4" type="video/mp4">
</video><!-- Tulisan PUTZ --><div class="putz">PUTZ</div><!-- Menu Login Transparan --><div class="login-box">
    <h2>Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Masuk</button>
</div><script>
function enterSite() {
    var video = document.getElementById("bg-video");
    video.play();
    document.getElementById("overlay").style.display = "none";
}
</script></body>
</html>
