<!DOCTYPE html><html>
<head>
    <title>Website Putra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }/* Video Background */
    #bg-video {
        position: fixed;
        top: 0;
        left: 0;
        min-width: 100%;
        min-height: 100%;
        object-fit: cover;
        z-index: -1;
    }

    /* Overlay Masuk */
    #overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        cursor: pointer;
        z-index: 10;
    }

    #overlay h1 {
        font-size: 28px;
    }

    /* Konten Website */
    .content {
        position: relative;
        text-align: center;
        top: 40%;
    }
</style>

</head>
<body><!-- Overlay Klik untuk Masuk --><div id="overlay" onclick="enterSite()">
    <h1>Tekan Untuk Masuk</h1>
</div><!-- Video Background dengan Audio --><video id="bg-video" loop>
    <source src="ssstik.io_@rayy_senpai03_1772594552530.mp4" type="video/mp4">
</video><!-- Konten Website --><div class="content">
    <h1>Website Saya</h1>
    <p>Selamat datang di website dengan background animasi 🎥</p>
</div><script>
function enterSite() {
    var video = document.getElementById("bg-video");
    video.play(); // Putar video + audio setelah klik
    document.getElementById("overlay").style.display = "none";
}
</script></body>
</html>
